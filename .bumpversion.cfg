[bumpversion]
current_version = 0.3.0-dev.4
commit = True
tag = True
message = Bump version: {current_version} → {new_version}
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(-dev\.(?P<dev>\d+))?
serialize = 
	{major}.{minor}.{patch}-dev.{dev}
	{major}.{minor}.{patch}

[bumpversion:file:VERSION]
