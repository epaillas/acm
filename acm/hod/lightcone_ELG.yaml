# Comment out the probes you don't need
# CAREFUL: yaml is super sensitive to spaces - don't use tabs

# Simulation parameters
sim_params:
    sim_dir: '/global/cfs/cdirs/desi/public/cosmosim/AbacusSummit/halo_light_cones/'
    subsample_dir: '/pscratch/sd/e/epaillas/summit_subsamples/lightcones/'
    cleaned_halos: '/global/cfs/cdirs/desi/public/cosmosim/AbacusSummit/cleaning/'
    Nthread_load: 3
    z_mock: 0.575                                                      
    halo_lc: True

prepare_sim:
    Nparallel_load: 2

# HOD parameters
HOD_params:
    use_particles: True
    want_ranks: True               # want to implement satellite profile flexiblities?
    want_AB: True               # want to implement assembly bias?              
    density_sigma: 3               # scale radius in Mpc / h for local density calculation
    tracer_flags:                  # which tracer do we want?
        LRG: False 
        ELG: True
        QSO: False
    want_rsd: False                 # want RSD? 
    write_to_disk: False

    LRG_params:
        logM_cut: 12.87
        logM1: 14.06
