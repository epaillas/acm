name: "Feature Request"
description: "Suggest an idea for this project"
title: "[Feature] "
# assignees: []
# type: feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please fill in the details below to help us understand your request.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Please provide a detailed description of the feature you are requesting.
      placeholder: Describe the feature you would like to see implemented.

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: What are the benefits of this feature? How will it improve the project?
      placeholder: Describe the benefits of implementing this feature.

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds? If so, please describe them.
      placeholder: Describe any alternatives you have considered.

  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for this feature.
      options:
        - label: I have searched the existing issues
          required: true