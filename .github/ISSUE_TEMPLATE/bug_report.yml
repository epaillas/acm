name: "Bug Report"
description: "File a bug report to help us improve this project"
title: "[Bug] "
labels: bug
# assignees: []
# type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below to help us understand the issue.

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide a step-by-step description of how to reproduce the issue.
      placeholder: |
        Describe the steps to reproduce the bug.

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected to happen.

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened.

  - type: textarea
    id: solutions
    attributes:
      label: Possible Solutions
      description: If you have any ideas on how to fix the issue, please share them here.
      placeholder: Describe any possible solutions you have in mind.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (if applicable)
      description: If applicable, add screenshots to help explain your problem.
      placeholder: Provide links to screenshots or attach them directly.

  - type: input
    id: version
    attributes:
      label: Version
      description: Please specify the version of the software you are using when you encountered the bug.
      placeholder: e.g., 1.0.0-dev.1

  - type: checkboxes
    id: nersc
    attributes:
      label: Environment Check
      options:
        - label: I encountered the bug on NERSC resources
        - label: I run the cosmodesi environment

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Provide any additional context or information about the issue.
  
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true