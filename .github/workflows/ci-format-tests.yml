name: CI for pull request format and pytest
description: |
  This workflow runs on pull requests to the dev and main branches. 
  It performs code formatting using ruff and runs pytest for testing. 
  The workflow is designed to ensure code quality and consistency before merging changes into the main branches.
  When running, the first job checks the code formatting and pushes any necessary changes back to the pull request branch.
  The push will re-trigger the workflow - which will cancel the current one, 
  but the second one will not run the formatting again as the commit message will be checked.
  The second job only runs if the formatting job did not push any changes, ensuring that tests are only run on properly formatted code.

on:
  pull_request:
    branches: ["dev","main"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  job_format:
    name : ruff format
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.PUSH_KEY }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configuration
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache installation
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip- 

      - name: Installation package with editable mode
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Format
        id: format
        run: |
            ruff check --select I --fix acm
            ruff format --config quality/ruff.toml acm

      - name: Check if there are changes
        id: check_changes
        run: |
          if  [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        # Pushing will cancel the current workflow and trigger a new one, 
        # but the new one wil allready have the code formatted, so it will not push any changes and will run the tests.
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add acm
          git commit -m "ruff format"
          git push

  job_pytest:
    name : pytest
    runs-on: ubuntu-latest
    needs: job_format
    # Only run tests if the formatting job did not push any changes, ensuring that tests are only run on properly formatted code.
    if: needs.job_format.outputs.has_changes == 'false' 
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Cache installation
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip- 

      - name: mpi Installation
        run: |
          sudo apt install -y openmpi-bin libopenmpi-dev

      - name: Installation package with editable mode
        run: |
          python -m pip install --upgrade pip
          pip install -e .[testing,sunbird,cosmodesi,jaxpower]

      - name: Process tests
        run: |
          source quality/acm_quality_init.sh
          pytest tests/acm -vv -s