name: CI for pull request format and pytest

on:
  pull_request:
    branches: ["dev","main"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  job_format:
    name : Ruff formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.PUSH_KEY }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configuration
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Installation package with editable mode
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Format
        id: format
        run: |
            ruff check --select I --fix acm
            ruff format --config quality/ruff.toml acm

      - name: Check if there are changes
        id: check_changes
        run: |
          if  [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add acm
          git commit -m "Ruff format"
          git push

  job_pytest:
    name : Pytest runner
    runs-on: ubuntu-latest
    needs: job_format
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Configuration
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache installation
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip- 

      - name: mpi Installation
        run: |
          sudo apt install -y openmpi-bin libopenmpi-dev

      - name: Installation package with editable mode
        run: |
          python -m pip install --upgrade pip
          pip install -e .[testing,sunbird,cosmodesi,jaxpower]

      - name: Process tests
        run: |
          source quality/acm_quality_init.sh
          pytest tests/acm -vv -s
