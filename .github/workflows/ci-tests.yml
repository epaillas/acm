name: CI for pull request, notify test regression

on:
  pull_request:
    branches: [ "cosmodesi" ]
    types: [opened, synchronize, reopened]

  push:
    branches: [ "test-ci" ]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Configuration
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" 

      - name: Installation package with editable mode
        run: |
          python -m pip install --upgrade pip
          pip install -e .[testing,sunbird,cosmodesi]

      - name: Process tests
        run: |
          pytest tests/acm -vv -s

